<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Books</title>
</head>
<body>
    <h1>My Books</h1>
    <table>
        <thead>
            <tr>
                <th>Title</th><th>Author</th><th>ISBN</th>
            </tr>
        </thead>
        <tbody id="books-body">
        </tbody>
    </table>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://jfwsbfnmapunougcrodw.supabase.co'
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impmd3NiZm5tYXB1bm91Z2Nyb2R3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODYxNjksImV4cCI6MjA4OTE2MjE2OX0.-6apgf_zYAU4BsLbHMFwhjUfBBV4VbzIOt5mMGMM8dQ'
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)
        async function loadBooks() {
            const { data, error } = await supabaseClient.from('books').select('*')
            const tbody = document.getElementById('books-body')
            tbody.innerHTML = ''
            data.forEach(book => {
                const tr = document.createElement('tr')
                tr.innerHTML = `<td>${book.title}</td><td>${book.author}</td><td>${book.isbn}</td>`
                tbody.appendChild(tr)
            })
        }
        loadBooks()
    </script>
</body>
</html>
